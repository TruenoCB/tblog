version: '3.8'

services:
  halo:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: halo
    restart: on-failure:3
    ports:
      - "8090:8090"
    environment:
      # 告诉 Halo 使用外部 MySQL 数据库
      - SPRING_R2DBC_URL=r2dbc:mysql://mysql:3306/halo?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_R2DBC_USERNAME=root
      - SPRING_R2DBC_PASSWORD=halo_db_password
      - SPRING_SQL_INIT_PLATFORM=mysql
      # 将外部访问地址设为服务器的 IP 或域名 (如果绑定了域名，请修改此处)
      - HALO_EXTERNAL_URL=http://localhost:8090
    volumes:
      # 使用命名卷持久化数据 (主题、插件、配置、附件)
      - halo_data:/root/.halo2
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.1
    container_name: halo-mysql
    restart: always
    # 配置 MySQL 8 的默认认证方式和字符集，防止中文乱码和连接报错
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    environment:
      - MYSQL_ROOT_PASSWORD=halo_db_password
      - MYSQL_DATABASE=halo
    volumes:
      # 持久化 MySQL 数据
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-phalo_db_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  halo_data:
  mysql_data:
